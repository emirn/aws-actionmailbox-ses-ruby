name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  ruby_version: 3.4

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # JRuby-10.0 is failing with Rails 7.1 due to a bug.
        # See: https://github.com/jruby/jruby/issues/8853
        ruby: [2.7, '3.0', 3.1, 3.2, 3.3, 3.4, '4.0', jruby-9.4, jruby-10.0]
        rails: [7.1, 7.2, '8.0', main]

        exclude:
          # Rails 7.2 is Ruby >= 3.1
          - rails: 7.2
            ruby: 2.7
          - rails: 7.2
            ruby: 3.0
          # Rails 8.0 is Ruby >= 3.2
          - rails: '8.0'
            ruby: 2.7
          - rails: '8.0'
            ruby: 3.0
          - rails: '8.0'
            ruby: 3.1
          - rails: '8.0'
            ruby: jruby-9.4
          # Rails main is Ruby >= 3.2
          - rails: main
            ruby: 2.7
          - rails: main
            ruby: 3.0
          - rails: main
            ruby: 3.1
          - rails: main
            ruby: 3.2
          - rails: main
            ruby: jruby-9.4
          # sqlite3 doesn't exist for jruby rails 7.2+
          # Contains some duplicate matrix entry
          - rails: 7.2
            ruby: jruby-9.4
          - rails: '8.0'
            ruby: jruby-9.4
          - rails: main
            ruby: jruby-9.4
          - rails: 7.2
            ruby: jruby-10.0
          # JRuby-10.0 is expected to fail since Rails 8 is supported yet
          # see: https://blog.jruby.org/2025/04/jruby-10-part-1-whats-new
          - rails: '8.0'
            ruby: jruby-10.0
          - rails: main
            ruby: jruby-10.0

    steps:
      - uses: actions/checkout@v4

      - name: Set RAILS_VERSION
        run: echo "RAILS_VERSION=${{ matrix.rails }}" >> $GITHUB_ENV

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Test
        run: bundle exec rake test

  rubocop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.ruby_version }}

      - name: Install gems
        run: |
          bundle config set --local with 'development'
          bundle install

      - name: Rubocop
        run: bundle exec rake rubocop
